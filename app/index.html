<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Bench</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="topbar">
          <div>
            <p class="eyebrow">Playwright practice</p>
            <h1>Test Bench</h1>
          </div>
          <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle dark mode">
            <span aria-hidden="true">◐</span>
          </button>
        </div>

        <form class="composer" id="task-form">
          <label for="task-input">New task</label>
          <div class="input-row">
            <input id="task-input" name="task" type="text" placeholder="Add something to test">
            <button type="submit">Add</button>
          </div>
          <p class="error" id="task-error" role="alert"></p>
        </form>

        <div class="toolbar" aria-label="Task filters">
          <button class="filter active" type="button" data-filter="all">All</button>
          <button class="filter" type="button" data-filter="open">Open</button>
          <button class="filter" type="button" data-filter="done">Done</button>
        </div>

        <ul class="tasks" id="task-list" aria-label="Tasks"></ul>

        <div class="summary">
          <span id="task-count">0 open tasks</span>
          <button id="clear-done" type="button">Clear done</button>
        </div>
      </section>

      <section class="panel utility">
        <h2>Counter</h2>
        <div class="counter">
          <button type="button" id="decrement" aria-label="Decrease counter">−</button>
          <output id="counter-value" aria-live="polite">0</output>
          <button type="button" id="increment" aria-label="Increase counter">+</button>
        </div>
        <button id="reset-counter" type="button">Reset</button>
      </section>
    </main>

    <script src="/main.js"></script>
  </body>
</html>
